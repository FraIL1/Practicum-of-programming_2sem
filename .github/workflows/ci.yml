name: Python CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Устанавливаем зависимости для тестов и линтеров
        pip install pytest pytest-cov flake8 mypy
        # Добавляем текущую директорию в PYTHONPATH, чтобы работали импорты 'app.core' и т.д.
        echo "PYTHONPATH=." >> $GITHUB_ENV

    - name: Lint with Flake8
      run: |
        # Проверка на критические синтаксические ошибки
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Проверка стиля (не прерывает сборку при предупреждениях, но выводит их)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Type check with Mypy
      run: |
        mypy app/ main.py --ignore-missing-imports || true

    - name: Test with Pytest and Coverage
      run: |
        # Запуск тестов с измерением покрытия
        # --cov=app : измеряем покрытие пакета app
        # --cov-fail-under=80 : сборка упадет, если покрытие меньше 80%
        pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=80 -v
